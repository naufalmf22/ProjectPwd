<!DOCTYPE html>
<html>
<head>
    <title>Sektor Radar Map - Purwadadi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="content-body">

    <div class="crt-overlay"></div>

    <div class="peta-radar-container">
        
        <div class="radar-header">
            <div class="sys-status">
                <span class="blink-dot"></span> AREA_SECTOR_MAP // ACTIVE_SAT_UAV
            </div>
            <h1 class="radar-title">SEKTOR PURWADADI HUB</h1>
            <div class="radar-line"></div>
        </div>

        <div class="radar-map-wrapper">
            
            <div class="radar-data-panel">
                <div class="data-block">
                    <span class="data-label">[LAT]</span>
                    <span class="data-value">06°28'S</span>
                </div>
                <div class="data-block">
                    <span class="data-label">[LONG]</span>
                    <span class="data-value">107°40'E</span>
                </div>
                <div class="data-block">
                    <span class="data-label">[ELEVATION]</span>
                    <span class="data-value">55M AMSL</span>
                </div>
                <div class="data-block-large">
                    <span class="data-label">[SECTOR INFO]</span>
                    <span class="data-description">Area ini mencakup seluruh wilayah administratif Kecamatan Purwadadi, Kabupaten Subang.</span>
                </div>
            </div>

            <div class="radar-display">
                <div class="peta-image-frame">
                    <img src="gambar/petapwd.jpg" class="radar-image">
                    
                    <div class="radar-scanline"></div>
                    
                    <div class="frame-corner top-left"></div>
                    <div class="frame-corner top-right"></div>
                    <div class="frame-corner bottom-left"></div>
                    <div class="frame-corner bottom-right"></div>
                </div>
                <span class="image-caption">[Sektor Purwadadi Map]</span>
            </div>
        </div>

    </div>

</body>
</html>
