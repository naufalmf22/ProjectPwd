<!DOCTYPE html>
<html>
<head>
    <title>Header</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="header-body">

    <!-- Container Utama Background Tetap Menggunakan Gambar Kamu -->
    <div class="header-container" style="background-image: linear-gradient(rgba(10, 6, 24, 0.75), rgba(10, 6, 24, 0.85)), url('gambar/heder.jpg');">
        
        <table border="0" width="100%" height="200" cellspacing="0" cellpadding="0">
            <tr>
                
                <!-- SEKTOR 01: LOGO KABUPATEN -->
                <td width="20%" align="center" class="logo-container">
                    <img src="gambar/logo.webp" class="logo">
                </td>

                <!-- SEKTOR 02: JUDUL UTAMA DASHBOARD -->
                <td width="60%" align="center" class="title-container">
                    <div class="header-text">
                        <h1 class="hud-title">PROFIL KECAMATAN PURWADADI</h1>
                        <h3 class="hud-subtitle">Kecamatan Purwadadi - Kabupaten Subang</h3>
                    </div>
                </td>

                <!-- SEKTOR 03: PROFIL COMMANDER (CAMAT) -->
                <td width="20%" align="center" class="camat-container">
                    <div class="camat-hud">
                        <img src="gambar/camat.jpg" class="camat-photo">
                        <div class="camat-status">
                            <span class="camat-rank">COMMANDER</span>
                            <div class="hp-bar"><div class="hp-bar-fill"></div></div>
                        </div>
                    </div>
                </td>

            </tr>
        </table>

    </div>

</body>
</html>
